<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PC Mall | Products</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header">
    <a class="brand" th:href="@{/products}">PC Mall</a>
    <nav class="nav-links" aria-label="Main navigation">
        <a class="nav-link active" th:href="@{/products}">Products</a>
        <a class="cart-link" th:href="@{/cart}">
            Cart
            <span class="cart-count" th:text="${cartSummary.totalQuantity}">0</span>
        </a>
    </nav>
</header>

<main>
    <section class="catalog-intro" aria-labelledby="catalog-title">
        <div>
            <p class="eyebrow">Mock inventory</p>
            <h1 id="catalog-title">PC gear ready for checkout tests.</h1>
            <p class="intro-copy">Browse laptops, displays, and desk essentials served by Spring Boot mock interfaces.</p>
        </div>
        <a class="secondary-action" th:href="@{/api/mock/products}">View mock JSON</a>
    </section>

    <section class="feedback" aria-live="polite" th:if="${notice != null || error != null}">
        <p class="notice" th:if="${notice != null}" th:text="${notice}">Added to cart.</p>
        <p class="error" th:if="${error != null}" th:text="${error}">Something went wrong.</p>
    </section>

    <section class="product-grid" aria-label="Product list">
        <article class="product-card reveal" th:each="product : ${products}">
            <div class="product-media">
                <img th:src="${product.imageUrl}" th:alt="${product.name}" loading="lazy">
                <span class="stock-badge" th:classappend="${product.inStock()} ? ' in-stock' : ' out-stock'"
                      th:text="${product.inStock()} ? 'In stock' : 'Sold out'">In stock</span>
            </div>
            <div class="product-body">
                <div class="product-meta">
                    <span th:text="${product.brand}">Brand</span>
                    <span th:text="${product.category}">Category</span>
                </div>
                <h2 th:text="${product.name}">Product name</h2>
                <p th:text="${product.description}">Product description</p>
                <div class="product-footer">
                    <strong th:text="'¥' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">¥0.00</strong>
                    <span th:text="'Stock ' + ${product.stock}">Stock 0</span>
                </div>
                <form class="add-form" th:action="@{/cart/items}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <label>
                        Quantity
                        <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}"
                               th:disabled="${!product.inStock()}">
                    </label>
                    <button type="submit" th:disabled="${!product.inStock()}">Add to cart</button>
                </form>
            </div>
        </article>
    </section>
</main>
</body>
</html>
